# ── Cache Browser: JS/CSS đã có hash trong tên file -> cache 1 năm an toàn ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML luôn phải revalidate để không bị index nội dung cũ
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build]
  command = "npm install && npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

# ── Edge Functions (SEO Prerender cho bot) ────────────────────────
[[edge_functions]]
  path = "/phim/*"
  function = "seo-prerender"

[[edge_functions]]
  path = "/watch/*"
  function = "seo-prerender"

[[edge_functions]]
  path = "/type/*"
  function = "seo-prerender"

# ── Sitemap động (PHẢI đứng trước SPA fallback) ──────────────────
[[redirects]]
  from = "/sitemap-movies.xml"
  to = "/.netlify/functions/sitemap-dynamic"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-categories.xml"
  to = "/.netlify/functions/sitemap-categories"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-images.xml"
  to = "/.netlify/functions/sitemap-images"
  status = 200
  force = true

[[redirects]]
  from = "/rss.xml"
  to = "/.netlify/functions/rss"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap-index.xml"
  to = "/sitemap-index.xml"
  status = 200
  force = false

# ── Telegram notify webhook ───────────────────────────────────────
[[redirects]]
  from = "/api/telegram-notify"
  to = "/.netlify/functions/telegram-notify"
  status = 200
  force = true

# ── SPA fallback (PHẢI đứng cuối cùng) ───────────────────────────
# Không dùng force=true để file tĩnh (.xml, robots.txt) vẫn được phục vụ
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
