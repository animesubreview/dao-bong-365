<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══ BASE STYLES (trước khi JS/CSS load — quan trọng cho Samsung TV) -->
    <style>
      html, body {
        margin: 0; padding: 0;
        background-color: #0a0a0f;
        color: #e2e8f0;
        font-family: 'Nunito', system-ui, sans-serif;
        min-height: 100%;
      }
      #root { min-height: 100vh; background-color: #0a0a0f; }
      /* Spinner toàn trang khi JS đang load */
      #initial-loader {
        position: fixed;
        top: 0; right: 0; bottom: 0; left: 0;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
      }
      #initial-loader .spin {
        width: 48px; height: 48px;
        border: 4px solid rgba(34,197,94,0.2);
        border-top-color: #22c55e;
        border-radius: 50%;
        animation: spin-anim 0.9s linear infinite;
      }
      @keyframes spin-anim { to { transform: rotate(360deg); } }
      #initial-loader p {
        margin-top: 16px;
        color: rgba(255,255,255,0.4);
        font-size: 14px;
        font-family: sans-serif;
      }
    </style>

    <!-- ═══ PRIMARY SEO ═══════════════════════════════════════════════════ -->

    <!-- ═══ SCHEMA.ORG ════════════════════════════════════════════════════ -->

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SPRW1XKQ2L');

  </head>
  <body>
    <!-- Loader hiện khi JS chưa chạy xong (Samsung TV cần thêm thời gian) -->
    <div id="initial-loader">
      <div class="spin"></div>
      <p>Đang tải Đảo Phim...</p>
    </div>

    <div id="root"></div>

    <script>
      // Ẩn loader khi React đã render xong
      document.addEventListener('DOMContentLoaded', function() {
        var checkRoot = setInterval(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var loader = document.getElementById('initial-loader');
            if (loader) loader.style.display = 'none';
            clearInterval(checkRoot);
          }
        }, 200);
        // Buộc ẩn sau 15 giây dù sao
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) loader.style.display = 'none';
          clearInterval(checkRoot);
        }, 15000);
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
