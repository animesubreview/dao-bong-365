  <body>
    <!-- Loader trống hiện trước khi React kịp mount (thường chỉ vài trăm ms) -->
    <div id="initial-loader"></div>

    <div id="root"></div>

    <script>
      (function () {
        var loader = document.getElementById('initial-loader');
        var hidden = false;

        function hideLoader() {
          if (hidden || !loader) return;
          hidden = true;
          loader.style.display = 'none';
        }

        // Ẩn loader trống ngay khi React đã render xong (App.tsx sẽ tự lo màn hình loading video)
        document.addEventListener('DOMContentLoaded', function () {
          var checkRoot = setInterval(function () {
            var root = document.getElementById('root');
            if (root && root.children.length > 0) {
              hideLoader();
              clearInterval(checkRoot);
            }
          }, 100);
          setTimeout(function () {
            hideLoader();
            clearInterval(checkRoot);
          }, 15000);
        });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
