name: Check New Movies (cron 30p)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Gọi API check-new-movies trên Vercel
        run: |
          curl -sS -L -X GET "https://www.daophim.online/api/check-new-movies" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP status: %{http_code}\n"
